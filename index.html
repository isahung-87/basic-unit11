<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Unit 11 - The Hotter the Better | 單字學習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-text-size-adjust: none;
            touch-action: manipulation;
        }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <!-- Header & Progress -->
    <header class="bg-white border-b sticky top-0 z-40 px-4 py-3" style="padding-top: calc(1rem + var(--safe-top))">
        <div class="max-w-4xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-indigo-900">Unit 11 <span class="text-sm font-normal text-gray-500">The Hotter the Better</span></h1>
                <div id="stage-toggle" class="bg-gray-100 p-1 rounded-lg flex gap-1 text-sm font-medium">
                    <button onclick="setStage(1)" id="btn-stage-1" class="px-3 py-1 rounded-md transition-all bg-white shadow-sm text-indigo-600">第一階段</button>
                    <button onclick="setStage(2)" id="btn-stage-2" class="px-3 py-1 rounded-md transition-all text-gray-500">第二階段</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex-1 bg-gray-200 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="progress-text" class="text-xs font-semibold text-indigo-700 whitespace-nowrap">0 / 8 已掌握</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-4">
        <!-- Views -->
        <section id="view-learn" class="view">
            <div id="flashcard-container" class="relative w-full max-w-sm mx-auto h-[450px] perspective-1000 mb-6">
                <!-- Card content will be injected here -->
            </div>
            
            <div class="flex justify-center items-center gap-6 mt-4">
                <button onclick="prevCard()" class="p-4 rounded-full bg-white shadow-md hover:bg-gray-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <button onclick="speakCurrentWord()" class="p-6 rounded-full bg-indigo-600 shadow-lg hover:bg-indigo-700 transition-all transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                </button>
                <button onclick="nextCard()" class="p-4 rounded-full bg-white shadow-md hover:bg-gray-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
            
            <p class="text-center text-gray-400 text-sm mt-8">點擊卡片翻面 • Tap card to flip</p>
        </section>

        <section id="view-game" class="view hidden">
            <div class="grid grid-cols-1 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-indigo-50">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-yellow-100 rounded-xl flex items-center justify-center text-2xl">⚡</div>
                        <div>
                            <h3 class="font-bold text-gray-800">第一關：眼明手快 (Speed Quiz)</h3>
                            <p class="text-sm text-gray-500 italic">選出正確的中文意思</p>
                        </div>
                    </div>
                    <button onclick="startLevel(1)" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">開始挑戰 Start Challenge</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-indigo-50">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-2xl">🧩</div>
                        <div>
                            <h3 class="font-bold text-gray-800">第二關：直覺配對 (Visual Match)</h3>
                            <p class="text-sm text-gray-500 italic">連結英中單字卡</p>
                        </div>
                    </div>
                    <button onclick="startLevel(2)" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">開始挑戰 Start Challenge</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-indigo-50">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center text-2xl">✍️</div>
                        <div>
                            <h3 class="font-bold text-gray-800">第三關：拼字大師 (Spelling Master)</h3>
                            <p class="text-sm text-gray-500 italic">根據中文拼出正確英文</p>
                        </div>
                    </div>
                    <button onclick="startLevel(3)" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">開始挑戰 Start Challenge</button>
                </div>
            </div>
        </section>

        <section id="view-log" class="view hidden">
            <!-- Stats -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
                <h3 class="font-bold text-lg text-gray-800 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                    最高紀錄 High Scores
                </h3>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="p-3 bg-gray-50 rounded-xl">
                        <div class="text-xs text-gray-500 mb-1">第一關</div>
                        <div id="score-l1" class="font-bold text-indigo-600 text-xl">0</div>
                    </div>
                    <div class="p-3 bg-gray-50 rounded-xl">
                        <div class="text-xs text-gray-500 mb-1">第二關</div>
                        <div id="score-l2" class="font-bold text-indigo-600 text-xl">0</div>
                    </div>
                    <div class="p-3 bg-gray-50 rounded-xl">
                        <div class="text-xs text-gray-500 mb-1">第三關</div>
                        <div id="score-l3" class="font-bold text-indigo-600 text-xl">0</div>
                    </div>
                </div>
            </div>

            <div id="learned-list" class="space-y-2">
                <!-- Word list injected here -->
            </div>

            <div class="mt-8 flex justify-center">
                <button onclick="resetAllData()" class="px-6 py-2 text-sm text-red-500 border border-red-200 rounded-full hover:bg-red-50 transition-colors">重置所有紀錄 Reset All Data</button>
            </div>
        </section>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 shadow-lg z-50" style="padding-bottom: var(--safe-bottom)">
        <button onclick="switchTab('learn')" id="nav-learn" class="flex flex-col items-center gap-1 text-indigo-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
            <span class="text-[10px] font-medium">學習 Learn</span>
        </button>
        <button onclick="switchTab('game')" id="nav-game" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-[10px] font-medium">挑戰 Challenge</span>
        </button>
        <button onclick="switchTab('log')" id="nav-log" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="text-[10px] font-medium">日誌 Logs</span>
        </button>
    </nav>

    <!-- Modal -->
    <div id="game-modal" class="fixed inset-0 bg-black bg-opacity-80 z-[60] hidden flex items-center justify-center p-4">
        <div id="game-container" class="bg-white rounded-3xl w-full max-w-lg h-[90vh] flex flex-col overflow-hidden relative">
        </div>
    </div>

    <!-- Toast -->
    <div id="alert-box" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white px-6 py-4 rounded-2xl shadow-2xl border border-gray-100 z-[100] hidden text-center animate-bounce">
        <p id="alert-text" class="font-bold text-gray-800"></p>
    </div>

    <script>
        // Data Structure (Updated with Bilingual Content)
        const vocabulary = [
            { id: 1, word: "wonder", phonetic: "[ˈwʌndər]", pos: "vt./vi./n.", meaning: "想知道；奇觀；驚奇", phrase: "it's no wonder that... (難怪...不足為奇)", example: "I wonder whether it will rain tomorrow. (我想知道明天會不會下雨。)", stage: 1 },
            { id: 2, word: "tropical", phonetic: "[ˈtrɑːpɪkl]", pos: "adj.", meaning: "熱帶的；濕熱的", phrase: "tropical rainforest (熱帶雨林)", example: "Much of northern Australia is covered in tropical rainforest. (澳洲北部大多覆蓋著熱帶雨林。)", stage: 1 },
            { id: 3, word: "tend", phonetic: "[tend]", pos: "vi./vt.", meaning: "傾向；易於；照顧", phrase: "tend to + V (傾向於；往往會...)", example: "Michael tends to walk faster than everyone else. (麥可走路往往比所有人還快。)", stage: 1 },
            { id: 4, word: "theory", phonetic: "[ˈθiːəri]", pos: "n.", meaning: "理論；學說；觀點", phrase: "theoretical (adj. 理論上的)", example: "The scientist tested her theory in the laboratory. (那位科學家在實驗室試驗她的理論。)", stage: 1 },
            { id: 5, word: "sweat", phonetic: "[swet]", pos: "vi./n.", meaning: "出汗；流汗；汗水", phrase: "no sweat (毫不費力；沒問題)", example: "I sweat a lot during summer. (我夏天很會流汗。)", stage: 1 },
            { id: 6, word: "focus", phonetic: "[ˈfoʊkəs]", pos: "vt./vi./n.", meaning: "集中；聚焦；焦點", phrase: "focus on... (集中於...；關注...)", example: "This book focuses on Taipei's history. (這本書著重在台北的歷史。)", stage: 1 },
            { id: 7, word: "actually", phonetic: "[ˈæktʃuəli]", pos: "adv.", meaning: "事實上；其實", phrase: "in fact (事實上；其實)", example: "Actually, I'm Canadian, not American. (事實上我是加拿大人，不是美國人。)", stage: 1 },
            { id: 8, word: "variety", phonetic: "[vəˈraɪəti]", pos: "n.", meaning: "各式各樣；多樣性", phrase: "a large variety of (各種各樣的)", example: "That store sells a variety of tables. (那間店賣各式各樣的桌子。)", stage: 1 },
            { id: 9, word: "available", phonetic: "[əˈveɪləbl]", pos: "adj.", meaning: "可利用的；有空的", phrase: "availability (n. 可獲得性)", example: "There aren't any rooms available at this hotel. (這間旅館沒有空房了。)", stage: 2 },
            { id: 10, word: "grain", phonetic: "[ɡreɪn]", pos: "n.", meaning: "穀物；穀粒", phrase: "price of grain (穀物價格)", example: "When the price of grain went up, the price of bread also rose. (當穀物價格上漲時，麵包價格也跟著漲。)", stage: 2 },
            { id: 11, word: "source", phonetic: "[sɔːrs]", pos: "n.", meaning: "來源；產地；源頭", phrase: "source of vitamin C (維他命C的來源)", example: "John Speke discovered the source of the Nile River. (約翰·斯皮克發現了尼羅河的源頭。)", stage: 2 },
            { id: 12, word: "range", phonetic: "[reɪndʒ]", pos: "n./vi.", meaning: "範圍；變動", phrase: "range from A to B (範圍從A到B)", example: "Prices range from ten to fifty dollars. (價格從十元到五十元不等。)", stage: 2 },
            { id: 13, word: "mixture", phonetic: "[ˈmɪkstʃər]", pos: "n.", meaning: "混合；混合體", phrase: "mix (v. 混合)", example: "He put a mixture of honey and chocolate on the bread. (他把蜂蜜和巧克力混合塗在麵包上。)", stage: 2 },
            { id: 14, word: "besides", phonetic: "[bɪˈsaɪdz]", pos: "adv./prep.", meaning: "此外；除了...之外", phrase: "in addition (此外；而且)", example: "Besides baseball, I play soccer and tennis. (除了打棒球之外，我還踢足球和打網球。)", stage: 2 },
            { id: 15, word: "deny", phonetic: "[dɪˈnaɪ]", pos: "vt.", meaning: "否認；拒絕給予", phrase: "there is no denying that (無庸置疑；不可否認)", example: "The man could not deny he had been there. (那名男子無法否認他去過那裡。)", stage: 2 },
            { id: 16, word: "dare", phonetic: "[der]", pos: "vt./n.", meaning: "挑戰；膽敢", phrase: "dare sb. to V (向某人挑戰...)", example: "Kevin dared me to go swimming with him. (凱文向我挑戰和他一起在極冷的水裡游泳。)", stage: 2 }
        ];

        // State
        let state = {
            currentStage: 1,
            currentIndex: 0,
            learned: JSON.parse(localStorage.getItem('unit11_learned')) || {},
            scores: JSON.parse(localStorage.getItem('unit11_scores')) || { l1: 0, l2: 0, l3: 0 }
        };

        const currentWordList = () => vocabulary.filter(w => w.stage === state.currentStage);

        function init() {
            renderFlashcard();
            updateProgress();
            updateScoresDisplay();
            renderLogList();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-indigo-600', 'text-gray-400'));
            document.getElementById(`nav-${tabId}`).classList.replace('text-gray-400', 'text-indigo-600');
            if (tabId === 'log') renderLogList();
        }

        function setStage(num) {
            state.currentStage = num;
            state.currentIndex = 0;
            document.getElementById('btn-stage-1').className = num === 1 ? 'px-3 py-1 rounded-md transition-all bg-white shadow-sm text-indigo-600' : 'px-3 py-1 rounded-md transition-all text-gray-500';
            document.getElementById('btn-stage-2').className = num === 2 ? 'px-3 py-1 rounded-md transition-all bg-white shadow-sm text-indigo-600' : 'px-3 py-1 rounded-md transition-all text-gray-500';
            renderFlashcard();
            updateProgress();
        }

        // Learn View
        function renderFlashcard() {
            const list = currentWordList();
            const word = list[state.currentIndex];
            const container = document.getElementById('flashcard-container');
            container.innerHTML = `
                <div class="card-inner w-full h-full relative cursor-pointer" onclick="this.parentElement.classList.toggle('flipped'); trackView(${word.id})">
                    <!-- 正面 -->
                    <div class="card-front absolute inset-0 bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 border border-gray-100">
                        <span class="text-indigo-500 font-bold mb-4">${state.currentStage === 1 ? '第一階段' : '第二階段'}</span>
                        <h2 class="text-5xl font-black text-gray-800 mb-2">${word.word}</h2>
                        <p class="text-xl text-gray-400 font-mono">${word.phonetic}</p>
                        <p class="mt-6 text-gray-400 italic">${word.pos}</p>
                    </div>
                    <!-- 背面 -->
                    <div class="card-back absolute inset-0 bg-indigo-600 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-white overflow-y-auto">
                        <h3 class="text-2xl font-bold mb-4">${word.meaning}</h3>
                        <div class="w-full h-px bg-indigo-400 opacity-50 mb-6"></div>
                        <div class="text-left w-full space-y-4">
                            <div>
                                <p class="text-xs uppercase tracking-wider text-indigo-200 font-bold mb-1">常用搭配詞 / 短語</p>
                                <p class="text-base font-medium leading-snug">${word.phrase}</p>
                            </div>
                            <div>
                                <p class="text-xs uppercase tracking-wider text-indigo-200 font-bold mb-1">例句參考</p>
                                <p class="text-sm leading-relaxed">${word.example}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.classList.remove('flipped');
        }

        function nextCard() { state.currentIndex = (state.currentIndex + 1) % currentWordList().length; renderFlashcard(); }
        function prevCard() { state.currentIndex = (state.currentIndex - 1 + currentWordList().length) % currentWordList().length; renderFlashcard(); }

        function speakCurrentWord() {
            const word = currentWordList()[state.currentIndex];
            const msg = new SpeechSynthesisUtterance(word.word);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
            trackHear(word.id);
        }

        function trackView(id) {
            if (!state.learned[id]) state.learned[id] = { views: 0, hears: 0 };
            state.learned[id].views++;
            checkLearned(id);
        }

        function trackHear(id) {
            if (!state.learned[id]) state.learned[id] = { views: 0, hears: 0 };
            state.learned[id].hears++;
            checkLearned(id);
        }

        function checkLearned(id) {
            const data = state.learned[id];
            if (data.views >= 2 && data.hears >= 1) {
                data.isLearned = true;
                localStorage.setItem('unit11_learned', JSON.stringify(state.learned));
                updateProgress();
            }
        }

        function updateProgress() {
            const list = currentWordList();
            const learnedCount = list.filter(w => state.learned[w.id]?.isLearned).length;
            const percent = (learnedCount / list.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${learnedCount} / ${list.length} 已掌握`;
        }

        // Game Implementation
        function startLevel(level) {
            const container = document.getElementById('game-container');
            document.getElementById('game-modal').classList.remove('hidden');
            if (level === 1) initLevel1(container);
            if (level === 2) initLevel2(container);
            if (level === 3) initLevel3(container);
        }

        function closeGame() { document.getElementById('game-modal').classList.add('hidden'); updateScoresDisplay(); }

        // Level 1: MCQ
        function initLevel1(container) {
            const words = [...currentWordList()].sort(() => Math.random() - 0.5).slice(0, 10);
            let score = 0, currentQ = 0, isProc = false, startT = Date.now();

            const next = () => {
                isProc = false;
                if (currentQ >= words.length) {
                    const time = Math.round((Date.now() - startT) / 1000);
                    showEnd("眼明手快", Math.max(score * 100 - time * 2, 0), "1");
                    return;
                }
                const correct = words[currentQ];
                const opts = [...vocabulary.filter(v => v.id !== correct.id).sort(() => Math.random() - 0.5).slice(0, 3), correct].sort(() => Math.random() - 0.5);
                container.innerHTML = `
                    <div class="p-4 bg-yellow-500 text-white font-bold flex justify-between"><span>第一關：MCQ</span><span>${currentQ + 1}/10</span></div>
                    <div class="p-8 flex-1 flex flex-col justify-center">
                        <h2 class="text-4xl font-black text-center mb-10 text-gray-800">${correct.word}</h2>
                        <div class="space-y-3">${opts.map(o => `<button onclick="window.chk1(this, ${o.id === correct.id})" class="w-full p-4 border-2 rounded-xl font-medium transition-all hover:bg-gray-50">${o.meaning}</button>`).join('')}</div>
                    </div>`;
            };
            window.chk1 = (btn, isCorrect) => {
                if (isProc || currentQ >= words.length) return; isProc = true;
                if (isCorrect) { score++; btn.classList.add('bg-green-500', 'text-white', 'border-green-500'); }
                else { btn.classList.add('bg-red-500', 'text-white', 'border-red-500', 'shake'); }
                setTimeout(() => { currentQ++; next(); }, isCorrect ? 500 : 1000);
            };
            next();
        }

        // Level 2: Visual Match (Words on front)
        function initLevel2(container) {
            const selected = [...currentWordList()].sort(() => Math.random() - 0.5).slice(0, 6);
            let cards = [];
            selected.forEach(w => {
                cards.push({ id: w.id, text: w.word, type: 'en' });
                cards.push({ id: w.id, text: w.meaning, type: 'zh' });
            });
            cards.sort(() => Math.random() - 0.5);
            let flipped = [], matches = 0, startT = Date.now();

            container.innerHTML = `
                <div class="p-4 bg-blue-600 text-white font-bold flex justify-between"><span>第二關：英中配對</span><button onclick="closeGame()">放棄</button></div>
                <div class="p-4 grid grid-cols-3 gap-2 flex-1 content-center bg-gray-50">
                    ${cards.map((c, i) => `
                        <div onclick="window.flip2(this, ${i})" class="h-24 bg-white rounded-lg shadow-sm border-2 border-transparent flex items-center justify-center p-2 text-center text-sm font-bold transition-all cursor-pointer">
                            <span>${c.text}</span>
                        </div>
                    `).join('')}
                </div>`;

            window.flip2 = (el, idx) => {
                if (flipped.length === 2 || el.classList.contains('bg-indigo-500') || el.classList.contains('bg-indigo-100')) return;
                el.classList.add('bg-indigo-100', 'border-indigo-400');
                flipped.push({ el, card: cards[idx] });

                if (flipped.length === 2) {
                    if (flipped[0].card.id === flipped[1].card.id && flipped[0].card.type !== flipped[1].card.type) {
                        flipped.forEach(f => { f.el.classList.replace('bg-indigo-100', 'bg-indigo-500'); f.el.classList.add('text-white'); });
                        matches++; flipped = [];
                        if (matches === selected.length) showEnd("直覺配對", Math.max(1000 - Math.round((Date.now() - startT)/100), 100), "2");
                    } else {
                        setTimeout(() => { flipped.forEach(f => f.el.classList.remove('bg-indigo-100', 'border-indigo-400')); flipped = []; }, 800);
                    }
                }
            };
        }

        // Level 3: Spelling Master
        function initLevel3(container) {
            const words = [...currentWordList()].sort(() => Math.random() - 0.5).slice(0, 8);
            let currentQ = 0, score = 0, isProc = false;

            const next = () => {
                isProc = false;
                if (currentQ >= words.length) { showEnd("拼字大師", score * 125, "3"); return; }
                const w = words[currentQ];
                container.innerHTML = `
                    <div class="p-4 bg-green-600 text-white font-bold flex justify-between"><span>第三關：拼寫測驗</span><span>${currentQ + 1}/${words.length}</span></div>
                    <div class="p-8 flex-1 flex flex-col items-center justify-center">
                        <p class="text-indigo-600 font-bold mb-2">${w.pos}</p>
                        <h2 class="text-3xl font-bold text-gray-800 mb-8">${w.meaning}</h2>
                        <input type="text" id="spell-in" autofocus class="w-full p-4 border-b-4 border-indigo-200 text-center text-2xl font-black outline-none focus:border-indigo-500 uppercase" placeholder="請輸入單字">
                        <button onclick="window.chk3()" class="mt-8 w-full py-4 bg-indigo-600 text-white rounded-xl font-bold">確認送出</button>
                    </div>`;
                const input = document.getElementById('spell-in'); input.focus();
                input.addEventListener('keypress', e => { if (e.key === 'Enter') window.chk3(); });
            };

            window.chk3 = () => {
                if (isProc || currentQ >= words.length) return;
                const inputEl = document.getElementById('spell-in');
                const val = inputEl.value.trim().toLowerCase(), correct = words[currentQ].word.toLowerCase();
                isProc = true;
                if (val === correct) { score++; showAlert("正確！ ✨"); currentQ++; setTimeout(next, 800); }
                else {
                    inputEl.classList.add('shake', 'text-red-500');
                    if (window.navigator.vibrate) window.navigator.vibrate(200);
                    setTimeout(() => { inputEl.classList.remove('shake', 'text-red-500'); showAlert(`答錯了！正確是: ${correct.toUpperCase()}`); currentQ++; setTimeout(next, 2000); }, 500);
                }
            };
            next();
        }

        function showEnd(title, score, key) {
            const isHigh = score > state.scores[`l${key}`];
            if (isHigh) { state.scores[`l${key}`] = score; localStorage.setItem('unit11_scores', JSON.stringify(state.scores)); }
            document.getElementById('game-container').innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-white">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-3xl font-black mb-2">${title}</h2>
                    <div class="text-sm text-gray-400 uppercase tracking-widest mb-1">本次得分</div>
                    <div class="text-6xl font-black text-indigo-600 mb-6">${score}</div>
                    ${isHigh ? '<div class="bg-yellow-400 text-yellow-900 px-4 py-1 rounded-full text-xs font-bold animate-pulse mb-8">創下新紀錄！</div>' : ''}
                    <button onclick="closeGame()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100">返回主頁</button>
                </div>`;
        }

        function renderLogList() {
            const list = document.getElementById('learned-list');
            list.innerHTML = `<h4 class="text-sm font-bold text-gray-400 mb-2 uppercase tracking-widest px-2">學習進度清單</h4>
                <div class="space-y-1">${vocabulary.map(w => {
                    const l = state.learned[w.id]?.isLearned;
                    return `<div class="bg-white p-3 rounded-xl border border-gray-100 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center ${l ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-300'}">${l ? '✓' : '•'}</div>
                            <div><div class="font-bold text-gray-800">${w.word}</div><div class="text-xs text-gray-400">${w.meaning}</div></div>
                        </div>
                        <button onclick="speakWordById(${w.id})" class="text-indigo-400 p-2"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg></button>
                    </div>`;
                }).join('')}</div>`;
        }

        function speakWordById(id) { const w = vocabulary.find(v => v.id === id); const m = new SpeechSynthesisUtterance(w.word); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
        function updateScoresDisplay() { ['l1','l2','l3'].forEach(k => document.getElementById(`score-${k}`).innerText = state.scores[k]); }
        function showAlert(t) { const b = document.getElementById('alert-box'); document.getElementById('alert-text').innerText = t; b.classList.remove('hidden'); setTimeout(() => b.classList.add('hidden'), 1500); }
        function resetAllData() { if (confirm("確定要重置所有進度嗎？")) { localStorage.clear(); location.reload(); } }

        window.onload = init;
    </script>
</body>
</html>
